name: attendance
description: "Kalina Engineering Attendance Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.2

  # Biometrics
  local_auth: ^2.3.0

  # GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Device ID
  device_info_plus: ^10.1.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Local cache
  hive_flutter: ^1.1.0

  # Anti-spoofing
  safe_device: ^1.1.6

  # Date formatting
  intl: ^0.19.0

  # Calendar widget
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
